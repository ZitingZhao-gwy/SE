server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: account-management
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# 数据库连接配置（DAO 层使用 DriverManager）
account:
  datasource:
    url: jdbc:mysql://localhost:3306/account_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${ACCOUNT_DB_USERNAME:}
    password: ${ACCOUNT_DB_PASSWORD:}
  blacklist:
    base-url: ${ACCOUNT_BLACKLIST_BASE_URL:http://10.196.95.30:8081}

logging:
  level:
    com.zju.account: DEBUG
    account.dao: DEBUG
    org.springframework.web: INFO
